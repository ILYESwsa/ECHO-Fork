name: Build APK

on:
  push:
    branches: [ main, master, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:           # allow manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true    # cancel older runs on the same branch

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # DEBUG build — runs on every push/PR, no secrets required
  # Produces: arm64FossDebug + universalFossDebug APKs
  # ─────────────────────────────────────────────────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            # Minimal placeholder so Firebase doesn't block the build
            cat > app/google-services.json << 'JSON'
          {
            "project_info": { "project_id": "placeholder", "project_number": "000000000000" },
            "client": [{
              "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "iad1tya.echo.music" } },
              "api_key": [{ "current_key": "placeholder" }],
              "services": {}
            }],
            "configuration_version": "1"
          }
          JSON
          fi

      - name: Generate debug keystore (persistent-debug)
        run: |
          if [ ! -f app/persistent-debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/persistent-debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APKs (arm64 + universal, FOSS)
        run: ./gradlew assembleArm64FossDebug assembleUniversalFossDebug --no-daemon --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" | while read f; do
            flavor=$(echo "$f" | grep -oP '(?<=apk/).*(?=/debug)' | tr '/' '-')
            cp "$f" "artifacts/EchoMusic-${flavor}-debug.apk"
          done
          ls -lh artifacts/

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks-${{ github.sha }}
          path: artifacts/*.apk
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # RELEASE build — runs only on version tags (v1.0.0, v2.3.1, etc.)
  # Produces signed APKs for all ABI flavors (FOSS variant)
  # Required secrets:
  #   KEYSTORE_BASE64      → base64 of your release.keystore file
  #   STORE_PASSWORD       → keystore password
  #   KEY_ALIAS            → key alias inside the keystore
  #   KEY_PASSWORD         → key password
  #   GOOGLE_SERVICES_JSON → your google-services.json content
  # ─────────────────────────────────────────────────────────────────────────
  build-release:
    name: Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode & install release keystore
        run: |
          mkdir -p app/keystore
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > app/keystore/release.keystore

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APKs (all ABI, FOSS variant)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew \
            assembleUniversalFossRelease \
            assembleArm64FossRelease \
            assembleArmeabiFossRelease \
            assembleX86FossRelease \
            assembleX8664FossRelease \
            --no-daemon --stacktrace

      - name: Collect & rename APKs
        run: |
          mkdir -p artifacts
          VERSION="${GITHUB_REF_NAME}"          # e.g. v5.1.6
          find app/build/outputs/apk -name "*.apk" | while read f; do
            abi=$(echo "$f" | grep -oP '(universal|arm64|armeabi|x86_64|x86)(?=Foss)')
            cp "$f" "artifacts/EchoMusic-${VERSION}-${abi}.apk"
          done
          ls -lh artifacts/

      - name: Upload release APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-${{ github.ref_name }}
          path: artifacts/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          name: "Echo Music ${{ github.ref_name }}"
          body: |
            ## Echo Music ${{ github.ref_name }}

            ### APK variants
            | File | Recommended for |
            |------|----------------|
            | `EchoMusic-*-universal.apk` | Any device (largest, safest choice) |
            | `EchoMusic-*-arm64.apk` | Most modern phones (2017+) |
            | `EchoMusic-*-armeabi.apk` | Old 32-bit ARM devices |
            | `EchoMusic-*-x86.apk` | Intel 32-bit (rare) |
            | `EchoMusic-*-x86_64.apk` | Intel 64-bit / emulators |

            > **Tip:** If unsure, download the `universal` APK.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
