name: Build APK

on:
  push:
    branches: [ main, master, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            cat > app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_id": "placeholder",
              "project_number": "000000000000",
              "firebase_url": "https://placeholder.firebaseio.com",
              "storage_bucket": "placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "iad1tya.echo.music" }
                },
                "api_key": [{ "current_key": "placeholder" }],
                "services": {}
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:1111111111111111",
                  "android_client_info": { "package_name": "iad1tya.echo.music.debug" }
                },
                "api_key": [{ "current_key": "placeholder" }],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          JSON
          fi

      - name: Generate debug keystore
        run: |
          if [ ! -f app/persistent-debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/persistent-debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,S=Debug,C=US"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APKs
        run: |
          ./gradlew \
            assembleArm64FossDebug \
            assembleUniversalFossDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" | while read f; do
            name=$(basename "$f" .apk)
            cp "$f" "artifacts/EchoMusic-${name}.apk"
          done
          ls -lh artifacts/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks-${{ github.sha }}
          path: artifacts/*.apk
          retention-days: 14

  build-release:
    name: Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode release keystore
        run: |
          mkdir -p app/keystore
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > app/keystore/release.keystore

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APKs
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew \
            assembleUniversalFossRelease \
            assembleArm64FossRelease \
            assembleArmeabiFossRelease \
            assembleX86FossRelease \
            assembleX8664FossRelease \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          VERSION="${GITHUB_REF_NAME}"
          find app/build/outputs/apk -name "*.apk" | while read f; do
            abi=$(echo "$f" | grep -oP '(universal|arm64|armeabi|x86_64|x86)(?=Foss)')
            cp "$f" "artifacts/EchoMusic-${VERSION}-${abi}.apk"
          done
          ls -lh artifacts/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-${{ github.ref_name }}
          path: artifacts/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.apk
          name: "Echo Music ${{ github.ref_name }}"
          body: |
            ## Echo Music ${{ github.ref_name }}
            | File | For |
            |------|-----|
            | `*-universal.apk` | Any device |
            | `*-arm64.apk` | Most phones (2017+) |
            | `*-armeabi.apk` | Old 32-bit ARM |
            | `*-x86_64.apk` | Emulators |
            | `*-x86.apk` | Intel 32-bit |
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
